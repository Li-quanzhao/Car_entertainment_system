// gRPC proto 定义 — 后续升级时使用
// 初期阶段 HMI ↔ Agent 通过 HTTP/JSON 通信
syntax = "proto3";

package car_assistant;

service CarAssistant {
  rpc ChatQuery(ChatRequest) returns (ChatResponse);
  rpc StreamChat(ChatRequest) returns (stream ChatResponse);
  rpc ExecuteTool(ToolRequest) returns (ToolResponse);
  rpc GetAgentStatus(Empty) returns (AgentStatus);
}

message ChatRequest {
  string session_id = 1;
  string message = 2;
  repeated ContextMessage history = 3;
  VehicleContext vehicle_state = 4;
}

message ChatResponse {
  string reply = 1;
  repeated ToolInvocation tools = 2;
  bool requires_confirmation = 3;
  string error = 4;
}

message ToolRequest {
  string tool_name = 1;
  map<string, string> parameters = 2;
}

message ToolResponse {
  bool success = 1;
  string result = 2;
  string error = 3;
}

message ContextMessage {
  string role = 1;
  string content = 2;
}

message VehicleContext {
  double speed = 1;
  double fuel_level = 2;
  double mileage = 3;
  string current_location = 4;
}

message ToolInvocation {
  string tool_name = 1;
  map<string, string> arguments = 2;
}

message AgentStatus {
  enum State { IDLE = 0; PROCESSING = 1; ERROR = 2; }
  State state = 1;
  string active_model = 2;
  bool is_online = 3;
  uint32 session_count = 4;
}

message Empty {}
