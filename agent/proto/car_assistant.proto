// gRPC proto 定义 — 车载娱乐系统 HMI ↔ Agent 通信
// 升级自 HTTP/JSON 协议，保持接口等价
syntax = "proto3";

package car_assistant;

// ============================================================
// 核心服务
// ============================================================
service CarAssistant {
  // 健康检查（等价 GET /api/health）
  rpc GetHealth(Empty) returns (HealthResponse);

  // 单次对话（等价 POST /api/chat）
  rpc ChatQuery(ChatRequest) returns (ChatResponse);

  // 流式对话（等价 POST /api/chat/stream，SSE → gRPC Server-Sent Streaming）
  rpc StreamChat(ChatRequest) returns (stream ChatResponse);

  // 执行工具（等价 POST /api/command）
  rpc ExecuteTool(ToolRequest) returns (ToolResponse);
}

// ============================================================
// 消息定义
// ============================================================

message Empty {}

// -- 健康检查 --
message HealthResponse {
  string status = 1;
  bool llm_available = 2;
  uint32 tools_count = 3;
  string version = 4;
}

// -- 对话 --
message ChatRequest {
  string session_id = 1;
  string message = 2;
  repeated ContextMessage history = 3;
  VehicleContext vehicle_state = 4;
}

message ChatResponse {
  string reply = 1;
  string session_id = 2;
  bool is_streaming = 3;
  repeated ToolInvocation tools = 4;
  bool requires_confirmation = 5;
  string error = 6;
}

message ContextMessage {
  string role = 1;    // "user" | "assistant" | "system"
  string content = 2;
}

message VehicleContext {
  double speed = 1;
  double fuel_level = 2;
  double mileage = 3;
  string current_location = 4;
}

message ToolInvocation {
  string tool_name = 1;
  map<string, string> arguments = 2;
}

// -- 工具执行 --
message ToolRequest {
  string tool_name = 1;
  map<string, string> parameters = 2;
}

message ToolResponse {
  bool success = 1;
  string data = 2;      // JSON 序列化结果
  string error = 3;
}

// -- Agent 状态 --
message AgentStatus {
  enum State { IDLE = 0; PROCESSING = 1; ERROR = 2; }
  State state = 1;
  string active_model = 2;
  bool is_online = 3;
  uint32 session_count = 4;
}
